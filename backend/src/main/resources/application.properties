# ============================================================
# CONFIGURACIÓN DE LA APLICACIÓN - TravelAgency
# ============================================================

# --- Nombre y puerto de la aplicación ---
spring.application.name=travelagency
server.port=8080

# --- Conexión a la Base de Datos MySQL ---
# "travelagency_db" es el nombre de la base de datos
# Estos son los valores por defecto para desarrollo local. En docker-compose
# se sobreescriben con las variables de entorno SPRING_DATASOURCE_URL/
# USERNAME/PASSWORD (Spring las mapea automaticamente a estas propiedades),
# asi que el password de produccion nunca queda commiteado en este archivo.
spring.datasource.url=jdbc:mysql://localhost:3306/travelagency_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# --- JPA / Hibernate ---
# "update" = Hibernate actualiza las tablas automáticamente al iniciar
# En producción se usa "validate" o "none"
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Keycloak / OAuth2 ---
# Configura esto cuando tengas Keycloak corriendo
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/travelagency
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/travelagency/protocol/openid-connect/certs

# --- CORS (permitir peticiones del frontend) ---
# Leido por SecurityConfig.corsConfigurationSource(): lista separada por comas.
# En Docker se sobreescribe con la variable de entorno APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=http://localhost:3000

# ============================================================
# ACTUATOR (health checks)
# ============================================================
# No hay server.servlet.context-path: cada controller ya define su propio
# prefijo /api/... en @RequestMapping, asi que actuator queda expuesto en
# /actuator/health (no /api/actuator/health).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.travelagency=DEBUG

# ============================================================
# REGLAS COMERCIALES DE DESCUENTOS (Épica 4)
# ============================================================
# Estos valores los lee DiscountConfig (config/DiscountConfig.java).
# Se pueden ajustar aquí sin tocar ni recompilar el código.

# Regla 1: descuento por cantidad de pasajeros (grupo)
app.discount.group.threshold=4
app.discount.group.percentage=5.0

# Regla 2: descuento por cliente frecuente (>= N reservas CONFIRMED)
app.discount.frequent.threshold=3
app.discount.frequent.percentage=10.0

# Regla 3: descuento por compra de múltiples paquetes (otra reserva
# no cancelada dentro de los últimos N días)
app.discount.multipackage.days=30
app.discount.multipackage.percentage=3.0

# Regla 4: tope máximo de descuento acumulado (todas las reglas sumadas)
app.discount.max.percentage=20.0

# ============================================================
# BLOQUEO DE CUENTA POR INTENTOS FALLIDOS (Épica 1, Regla 6)
# ============================================================
# Estos valores los lee SecurityLockoutConfig (config/SecurityLockoutConfig.java).
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=30
