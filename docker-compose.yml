version: '3.8'

services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # Sin "ports": solo accesible desde otros contenedores de travel-network,
    # no se expone al host ni a internet
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Backend - replica unica: el droplet de produccion actual tiene ~1GB RAM,
  # insuficiente para 3 replicas de Spring Boot + MySQL + nginx a la vez.
  # Para volver a 3 replicas (backend1/2/3), restaurar este bloque y el
  # upstream de nginx-balancer.conf, en un droplet de 2GB+.
  backend1:
    image: cosoriol/travel-agency-backend:latest
    restart: always
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    # Puerto expuesto solo para testing/debug directo del backend;
    # en produccion real el trafico deberia entrar unicamente por nginx-balancer.
    # Puerto 8001 (no 8081) para coexistir sin choques con otros
    # proyectos locales que ya usen ese rango (ver README-COEXISTENCIA.md).
    ports:
      - "8001:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React servido por Nginx)
  frontend:
    image: cosoriol/travel-agency-frontend:latest
    restart: always
    ports:
      - "3000:80"
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx como punto de entrada publico (puerto 80). Reenvia /api/ al backend
  # y todo lo demas al frontend (ver nginx-balancer.conf). No depende de
  # "frontend" en depends_on porque frontend no necesita esperar al
  # balanceador para arrancar y crear esa dependencia en el otro sentido
  # formaria un ciclo.
  nginx-balancer:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-balancer.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge

volumes:
  mysql_data:
