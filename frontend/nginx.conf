server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real cae en index.html
    # (deja que React Router resuelva el path del lado del cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Las llamadas relativas del frontend (baseURL: '/api') se reenvian al
    # balanceador, que a su vez las reparte entre las 3 replicas del backend.
    # Se resuelve "nginx-balancer" via variable + resolver (DNS interno de
    # Docker) en vez de en el proxy_pass directo: asi nginx no revienta al
    # arrancar si ese contenedor todavia no existe (evita el deadlock circular
    # frontend<->nginx-balancer en el docker-compose).
    # $request_uri (no una URI literal) porque, al usar una variable en el
    # host de proxy_pass, nginx deja de anexar automaticamente el resto del
    # path de la request al de proxy_pass: sin esto, cualquier /api/lo-que-sea
    # llegaria al balanceador como un "/api/" pelado (404).
    resolver 127.0.0.11 valid=10s;
    location /api/ {
        set $balancer_upstream nginx-balancer;
        proxy_pass http://$balancer_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
