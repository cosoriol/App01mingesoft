worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  # Upstream con una sola replica (ver nota en docker-compose.yml sobre RAM
  # del droplet actual). Para volver a balanceo entre 3 replicas, agregar
  # backend2/backend3 aqui y en docker-compose.yml.
  upstream backend_cluster {
    server backend1:8080 max_fails=2 fail_timeout=30s;
  }

  server {
    listen 80;
    server_name _;

    # Rutas al backend (balanceadas)
    location /api/ {
      proxy_pass http://backend_cluster;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_buffering off;
    }

    # Health check propio del balanceador (para DigitalOcean/monitoreo externo)
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # Todo lo demas (la SPA) se reenvia al contenedor frontend: puerto 80 queda
    # como unico punto de entrada publico, tal como documenta README-DEPLOYMENT.md
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
